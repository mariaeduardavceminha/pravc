<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mar(ia Eduarda).</title>

<style>

body{
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
margin:0;
}

.container{
padding:40px;
max-width:1000px;
margin:auto;
display:none;
}

h1{
margin-bottom:40px;
}

.fotos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.fotos img{
width:100%;
border-radius:15px;
box-shadow:0 0 15px rgba(255,255,255,0.3);
transition:0.3s;
}

.fotos img:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,255,255,0.6);
}

.texto{
max-width:700px;
margin:auto;
font-size:18px;
line-height:1.6;
}

.foto-texto{
width:350px;
border-radius:15px;
margin:30px auto;
display:block;
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

/* tela inicial */

#start{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="start">
Clique para entrar ❤️
</div>

<audio id="musica" loop>
<source src="nossamusica.mp3" type="audio/mpeg">
</audio>

<div class="container" id="site">

<h1>Para o amor da minha vida, e para colocar nossos futuros momentos juntos.</h1>


<div class="texto">

<p>
eu amo ouvir sua voz, e amo ficar em call com vc.
</p>

<p>
vc é linda, pft, seus olhares são perfeitos.
</p>

</div>

</div>

<script>

document.getElementById("start").onclick = function(){

document.getElementById("musica").play();

document.getElementById("start").style.display="none";

document.getElementById("site").style.display="block";

}

</script>

</body>
</html>
